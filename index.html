<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration with Email Confirmation</title>
    
    <style>
        /* ===== CSS STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            font-size: 14px;
        }

        label .required {
            color: #ff6b6b;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.error {
            border-color: #ff6b6b;
        }

        input.success {
            border-color: #51cf66;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        #message.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .email-status {
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
            background: #f8f9fa;
        }

        .email-status.active {
            display: block;
        }

        .email-status .sent {
            color: #51cf66;
        }

        .email-status .failed {
            color: #ff6b6b;
        }

        .email-status .sending {
            color: #667eea;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 Student Registration</h1>
        <p class="subtitle">Register and receive instant email confirmation</p>
        
        <form id="registrationForm">
            <div class="form-group">
                <label for="name">Full Name <span class="required">*</span></label>
                <input 
                    type="text" 
                    id="name" 
                    placeholder="Enter your full name" 
                    required 
                    minlength="2"
                    maxlength="100"
                    autocomplete="name"
                />
            </div>
            
            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email" 
                    required 
                    autocomplete="email"
                />
                <div class="email-status" id="emailStatus"></div>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number <span class="required">*</span></label>
                <input 
                    type="tel" 
                    id="phone" 
                    placeholder="Enter your phone number" 
                    required 
                    pattern="[0-9+\-\s]{8,15}"
                    title="Please enter a valid phone number (8-15 digits)"
                    autocomplete="tel"
                />
            </div>
            
            <button type="submit" id="registerBtn">
                Register
            </button>
        </form>
        
        <div id="message"></div>
    </div>

    <!-- ===== EMAILJS LIBRARY ===== -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    
    <script>
        // ============================================
        // 📧 EMAILJS CONFIGURATION - UPDATE THESE!
        // ============================================
        const EMAILJS_CONFIG = {
            PUBLIC_KEY: 'LlX_AFjkLzB3vkvv0',    // Example: 'user_abc123xyz'
            SERVICE_ID: 'service_t0gag7f',    // Example: 'service_abc123'
            TEMPLATE_ID: 'template_0su5dou'   // Example: 'template_xyz789'
        };

        // ============================================
        // GOOGLE SHEETS CONFIGURATION
        // ============================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5IitVMy4sVUjKsLPDynI9vq2wxhI7le0mNEHobTbGdmlnbG5eFP52RFRHXllJbGPv_w/exec';

        // Initialize EmailJS
        try {
            emailjs.init(EMAILJS_CONFIG.PUBLIC_KEY);
            console.log('✅ EmailJS initialized successfully');
        } catch (error) {
            console.error('❌ EmailJS initialization failed:', error);
        }

        // DOM elements
        const form = document.getElementById('registrationForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const registerBtn = document.getElementById('registerBtn');
        const messageDiv = document.getElementById('message');
        const emailStatus = document.getElementById('emailStatus');

        // Helper function to show message
        function showMessage(text, type = 'success') {
            messageDiv.textContent = text;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 7000);
            }
        }

        // Helper function to set loading state
        function setLoading(isLoading) {
            if (isLoading) {
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<span class="loading-spinner"></span> Processing...';
            } else {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register';
            }
        }

        // ============================================
        // 📧 SEND CONFIRMATION EMAIL
        // ============================================
        async function sendConfirmationEmail(studentData) {
            try {
                // Validate email
                if (!studentData.email || studentData.email.trim() === '') {
                    throw new Error('Email address is empty');
                }

                emailStatus.className = 'email-status active';
                emailStatus.innerHTML = '<span class="sending">⏳ Sending confirmation email...</span>';

                // Prepare template parameters
                const templateParams = {
                    to_email: studentData.email.trim(),
                    to_name: studentData.name.trim(),
                    student_name: studentData.name.trim(),
                    registration_date: new Date().toLocaleString('en-US', {
                        weekday: 'long',
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    }),
                    phone: studentData.phone.trim(),
                    user_email: studentData.email.trim(),
                    user_name: studentData.name.trim()
                };

                // Send email
                const response = await emailjs.send(
                    EMAILJS_CONFIG.SERVICE_ID,
                    EMAILJS_CONFIG.TEMPLATE_ID,
                    templateParams
                );

                emailStatus.innerHTML = '<span class="sent">✅ Confirmation email sent successfully!</span>';
                return true;
            } catch (error) {
                console.error('Email error:', error);
                
                let errorMessage = '⚠️ Could not send email. ';
                if (error.text) {
                    errorMessage += error.text;
                } else if (error.message) {
                    errorMessage += error.message;
                }
                
                emailStatus.innerHTML = `<span class="failed">${errorMessage}</span>`;
                return false;
            }
        }

        // ============================================
        // SAVE TO GOOGLE SHEETS
        // ============================================
        async function saveToGoogleSheets(studentData, emailSent) {
            try {
                const dataToSave = {
                    name: studentData.name,
                    email: studentData.email,
                    phone: studentData.phone,
                    emailSent: emailSent ? 'Yes' : 'No',
                    status: emailSent ? 'Confirmed' : 'Registration Only',
                    timestamp: new Date().toISOString()
                };

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(dataToSave)
                });

                return true;
            } catch (error) {
                console.error('Google Sheets save error:', error);
                return false;
            }
        }

        // ============================================
        // FORM SUBMISSION HANDLER
        // ============================================
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Clear previous messages
            messageDiv.style.display = 'none';
            emailStatus.className = 'email-status';
            
            // Get form data
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const phone = phoneInput.value.trim();

            // Validation
            if (!name || !email || !phone) {
                showMessage('Please fill in all fields.', 'error');
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address.', 'error');
                return;
            }

            // Phone validation
            const phoneRegex = /^[0-9+\-\s]{8,15}$/;
            if (!phoneRegex.test(phone)) {
                showMessage('Please enter a valid phone number (8-15 digits).', 'error');
                return;
            }

            // Prepare student data
            const studentData = {
                name: name,
                email: email,
                phone: phone,
                timestamp: new Date().toISOString()
            };

            setLoading(true);

            let emailSent = false;
            let savedToSheets = false;

            try {
                // Step 1: Send email
                emailSent = await sendConfirmationEmail(studentData);
                
                // Step 2: Save to Google Sheets
                savedToSheets = await saveToGoogleSheets(studentData, emailSent);

                // Show final result
                if (savedToSheets && emailSent) {
                    showMessage('✅ Registration successful! Confirmation email sent to ' + email, 'success');
                    form.reset();
                } else if (savedToSheets && !emailSent) {
                    showMessage('✅ Registration saved! But email could not be sent. Please check console.', 'info');
                    form.reset();
                } else if (!savedToSheets && emailSent) {
                    showMessage('⚠️ Email sent! But data could not be saved to spreadsheet.', 'info');
                    form.reset();
                } else {
                    showMessage('❌ Registration failed. Please try again.', 'error');
                }

            } catch (error) {
                console.error('Registration error:', error);
                showMessage('❌ Registration failed. Please try again.', 'error');
            } finally {
                setLoading(false);
            }
        });

        // ============================================
        // REAL-TIME VALIDATION
        // ============================================
        nameInput.addEventListener('input', function() {
            const valid = this.value.trim().length >= 2;
            this.className = this.value ? (valid ? 'success' : 'error') : '';
        });

        emailInput.addEventListener('input', function() {
            const email = this.value.trim();
            const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            this.className = email ? (valid ? 'success' : 'error') : '';
            
            if (email && valid) {
                emailStatus.className = 'email-status active';
                emailStatus.innerHTML = '<span class="sent">✅ Valid email - Confirmation will be sent here</span>';
            } else if (email) {
                emailStatus.className = 'email-status active';
                emailStatus.innerHTML = '<span class="failed">⚠️ Please enter a valid email address</span>';
            } else {
                emailStatus.className = 'email-status';
            }
        });

        phoneInput.addEventListener('input', function() {
            const valid = /^[0-9+\-\s]{8,15}$/.test(this.value.trim());
            this.className = this.value ? (valid ? 'success' : 'error') : '';
        });

        console.log('✅ Student Registration System loaded successfully!');
    </script>
</body>
</html>
